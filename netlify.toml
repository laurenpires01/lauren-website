# ============================================================
# Lauren Pires — netlify.toml
# ============================================================
# NOTE: Do NOT add http→https or non-www→www redirects here.
# Netlify handles HTTPS automatically. Adding domain redirects
# conflicts with Netlify's built-in SSL and causes redirect loops.
# The canonical www domain is set in Netlify dashboard under
# Domain Settings → Primary domain.

# ---- Clean URLs: strip .html extension ----
[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/about.html"
  to     = "/about"
  status = 301

