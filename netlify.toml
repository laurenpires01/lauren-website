# ============================================================
# Lauren Pires — netlify.toml
# ============================================================

# ---- Redirect all non-www and http to https://www ----
[[redirects]]
  from = "https://laurensaysyay.com/*"
  to   = "https://www.laurensaysyay.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://laurensaysyay.com/*"
  to   = "https://www.laurensaysyay.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.laurensaysyay.com/*"
  to   = "https://www.laurensaysyay.com/:splat"
  status = 301
  force  = true

# ---- Clean URLs: strip .html extension ----
[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/about.html"
  to     = "/about"
  status = 301

[[redirects]]
  from   = "/speaking.html"
  to     = "/speaking"
  status = 301

[[redirects]]
  from   = "/media.html"
  to     = "/media"
  status = 301

[[redirects]]
  from   = "/lightupforrare.html"
  to     = "/lightupforrare"
  status = 301

[[redirects]]
  from   = "/blog.html"
  to     = "/blog"
  status = 301

[[redirects]]
  from   = "/contact.html"
  to     = "/contact"
  status = 301

[[redirects]]
  from   = "/testimonials.html"
  to     = "/testimonials"
  status = 301

[[redirects]]
  from   = "/privacy.html"
  to     = "/privacy"
  status = 301

[[redirects]]
  from   = "/accessibility.html"
  to     = "/accessibility"
  status = 301

[[redirects]]
  from   = "/thank-you.html"
  to     = "/thank-you"
  status = 301

# ---- Cache headers ----
# HTML — short cache so updates appear quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS & JS — longer cache, fingerprinted by Netlify
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicons — long cache
[[headers]]
  for = "/favicons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
